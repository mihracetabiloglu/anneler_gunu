<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anneler Günü Sürprizi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fcf1f3;
            font-family: 'Caveat', cursive;
            overflow: hidden;
            position: relative;
        }

        /* --- ARKA PLAN SÜZÜLEN ÇİÇEKLER --- */
        #bg-flowers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bg-flower {
            position: absolute;
            opacity: 0.4;
            animation: floatDown linear infinite;
        }

        @keyframes floatDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* --- BUKET KONTEYNER --- */
        #bouquet-container {
            position: absolute;
            bottom: -5%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            z-index: 10;
        }

        .stem {
            position: absolute;
            bottom: 0;
            left: -5px;
            width: 10px;
            background: linear-gradient(to top, #2e7d32, #4caf50);
            transform-origin: bottom center;
            height: 0;
            transform: rotate(var(--angle));
            animation: growStem 1.2s ease-out var(--delay) forwards, 
                       swayStem 4s ease-in-out calc(var(--delay) + 1.2s) infinite alternate;
            border-radius: 5px;
        }

        @keyframes growStem { to { height: var(--height); } }
        @keyframes swayStem {
            0% { transform: rotate(calc(var(--angle) - 3deg)); }
            100% { transform: rotate(calc(var(--angle) + 3deg)); }
        }

        .flower-head {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: var(--size);
            animation: bloom 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) calc(var(--delay) + 1s) forwards;
        }

        @keyframes bloom { to { transform: translateX(-50%) scale(1); } }

        .ribbon {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 110px;
            z-index: 15;
            animation: popRibbon 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.5s forwards;
        }

        @keyframes popRibbon { to { transform: translateX(-50%) scale(1); } }

        /* --- ZARF VE FOTOĞRAF ANİMASYONU --- */

        #envelope-wrapper {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translate(-50%, 0) scale(0.5);
            opacity: 0;
            z-index: 25;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .show-envelope {
            transform: translate(-50%, 0) scale(1.1) !important;
            opacity: 1 !important;
        }

        /* Zarf açılınca aşağıya kayma animasyonu */
        #envelope-wrapper.move-down {
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translate(-50%, 180px) scale(1.1) !important;
        }

        .envelope {
            position: relative;
            width: 340px;
            height: 230px;
            background-color: #f7a8b8;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Zarfın Ön Kapakları */
        .envelope::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            border-left: 170px solid #f397aa;
            border-right: 170px solid #f397aa;
            border-top: 115px solid transparent;
            border-bottom: 115px solid #ef8399;
            border-radius: 0 0 8px 8px;
            z-index: 20; /* Fotoğraf başta bunun arkasında kalır */
        }

        /* Zarfın Üst Kapağı */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 130px solid #fa8a9f;
            transform-origin: top;
            transition: transform 0.6s ease-in-out;
            z-index: 25;
        }

        .envelope.open .flap { transform: rotateX(180deg); z-index: 5; }

        /* --- FOTOĞRAFLI NOT --- */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 310px;
            height: 400px;
            background-color: #fffafb;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 10; /* Başlangıçta zarfın ön kapağının arkasında */
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px dashed #f7a8b8;
            /* Akıcı geçiş ve z-index değişimi */
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s, 
                        z-index 0.1s linear 0.7s,
                        box-shadow 0.5s ease 0.8s;
        }

        /* ZARF AÇILINCA: Öne geçiş animasyonu */
        .envelope.open .letter {
            transform: translateX(-50%) translateY(-220px) scale(1.05) rotate(-2deg);
            z-index: 200; /* Zarfın her şeyinin önüne geçer */
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1) 0.3s, z-index 0.1s linear 0.7s, box-shadow 0.5s ease 0.8s;
        }

        .photo-frame {
            width: 100%;
            height: 220px;
            background-color: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .letter p {
            font-size: 32px;
            color: #d14966;
            margin: 0;
            text-align: center;
            font-family: 'Dancing Script', cursive;
        }

        .instruction {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #d14966;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="bg-flowers"></div>

    <div id="bouquet-container">
        <div class="ribbon">🎀</div>
    </div>

    <div id="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <!-- Zarfın içindeki mektup/fotoğraf -->
            <div class="letter">
                <div class="photo-frame">
                    <!-- Fotoğraf ismini kontrol et: fotografimiz.jpeg -->
                    <img src="foto.png" alt="Canım Annem">
                </div>
                <p>İyi ki bizim annemizsin, seni çok seviyoruz. 
                    Anneler günün kutlu olsun! ❤️</p>
            </div>
            <div class="instruction">Açmak için zarfa tıkla</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bouquet = document.getElementById('bouquet-container');
            const bgContainer = document.getElementById('bg-flowers');
            const envelopeWrapper = document.getElementById('envelope-wrapper');
            const envelope = document.getElementById('envelope');

            const flowerEmojis = ['🌹', '🌷', '🌼', '🌺', '🌸', '🌻', '🌿'];
            
            // Arka plan efektleri
            for (let i = 0; i < 30; i++) {
                const bgFlower = document.createElement('div');
                bgFlower.className = 'bg-flower';
                bgFlower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                bgFlower.style.left = Math.random() * 100 + 'vw';
                bgFlower.style.fontSize = (Math.random() * 20 + 20) + 'px';
                bgFlower.style.animationDuration = (Math.random() * 10 + 10) + 's';
                bgFlower.style.animationDelay = '-' + (Math.random() * 20) + 's';
                bgContainer.appendChild(bgFlower);
            }

            // Buket oluşturma
            let flowerData = [];
            for (let i = 0; i < 110; i++) {
                const angle = (Math.random() * 140) - 70; 
                const height = (Math.random() * 350) + 200; 
                const delay = Math.random() * 2; 
                const type = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                let size = (Math.random() * 30) + 80; 
                if (type === '🌿') size = size * 0.7; 
                flowerData.push({ angle, height, delay, type, size });
            }

            flowerData.sort((a, b) => b.height - a.height);

            flowerData.forEach((data, index) => {
                const stem = document.createElement('div');
                stem.className = 'stem';
                stem.style.setProperty('--angle', `${data.angle}deg`);
                stem.style.setProperty('--height', `${data.height}px`);
                stem.style.setProperty('--delay', `${data.delay}s`);
                stem.style.zIndex = (index < 55) ? 5 : 12;
                
                const head = document.createElement('div');
                head.className = 'flower-head';
                head.style.setProperty('--delay', `${data.delay}s`);
                head.style.setProperty('--size', `${data.size}px`);
                head.innerText = data.type;

                stem.appendChild(head);
                bouquet.appendChild(stem);
            });

            // Zarfı getir
            setTimeout(() => {
                envelopeWrapper.classList.add('show-envelope'); 
            }, 3800); 

            // Tıklama olayı
            envelope.addEventListener('click', () => {
                if (!envelope.classList.contains('open')) {
                    envelope.classList.add('open');
                    document.querySelector('.instruction').style.display = 'none';
                    // Zarf açıldıktan sonra, zarfı aşağıya kaydır
                    setTimeout(() => {
                        envelopeWrapper.classList.add('move-down');
                    }, 1200); // Fotoğraf animasyonu tamamlandıktan sonra kaydır
                }
            });
        });
    </script>
</body>
</html>
